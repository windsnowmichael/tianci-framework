name: NS方程并行求解
on:
  workflow_dispatch:
    inputs:
      reynolds:
        description: '雷诺数'
        required: false
        default: '1000'
jobs:
  solve:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        grid_size: [64, 128, 256]
    steps:
      - uses: actions/checkout@v4
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install numpy scipy matplotlib
      - name: 运行NS方程求解
        run: python ns_solver.py --grid-size ${{ matrix.grid_size }} --reynolds ${{ github.event.inputs.reynolds }}
      - name: 上传计算结果
        uses: actions/upload-artifact@v4
        with:
          name: ns-results-grid-${{ matrix.grid_size }}
          path: output/
