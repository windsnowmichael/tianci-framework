name: KS方程并行求解

on:
  workflow_dispatch:
    inputs:
      grid_size:
        description: '网格大小'
        required: false
        default: '64'

jobs:
  solve:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      matrix:
        init_density: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install numpy scipy matplotlib
      
      - name: 运行KS方程求解
        run: python ks_solver.py --init-density ${{ matrix.init_density }} --grid-size ${{ github.event.inputs.grid_size }}
      
      - name: 上传计算结果
        uses: actions/upload-artifact@v3
        with:
          name: ks-results-density-${{ matrix.init_density }}
          path: output/